# To prepare and run the environment: `conda env create -f intoxicate.yaml && conda activate intoxi-cate
name: intoxi-cate
channels:
  - bioconda
  - conda-forge
dependencies:
  - python == 3.12
  - biopython
  - pandas
  - pyyaml
  - pytorch
  - salmon
  - fastp
  - trinity
  - hmmer
  - mmseqs2
  - pip
  - pip:
    - hf-transfer
    - transformers == 4.34.0
    - git+https://github.com/BernhoferM/TMbed.git
    - .
